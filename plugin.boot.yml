pluginBootSpecVersion: "1.0"
pluginId: "com.morcherlf.deepseek"

mainServiceId: "deepseek-service"

services:
  deepseek-service:
    build_instructions:
      context: "."
      dockerfile: "Dockerfile"

    image: "griffino-dev/deepseek-plugin:local-latest"

    environment:
      # 系统注入 - RabbitMQ 连接信息
      - "RABBITMQ_HOST={{system.rabbitmq.host}}"
      - "RABBITMQ_PORT={{system.rabbitmq.port}}"
      - "RABBITMQ_USER={{system.rabbitmq.user}}"
      - "RABBITMQ_PASSWORD={{system.rabbitmq.password}}"
      # 系统注入 - Redis 连接信息
      - "REDIS_HOST={{system.redis.host}}"
      - "REDIS_PORT={{system.redis.port}}"
      - "REDIS_USER={{system.redis.user}}"
      - "REDIS_PASSWORD={{system.redis.password}}"
      # 管理员配置
      - "DEEPSEEK_API_KEY"
      - "DEEPSEEK_MODEL"
      - "DEEPSEEK_BASE_URL"
      - "MAX_TOKENS"
      - "SYSTEM_PROMPT"
      # 插件 ID（供服务内部使用）
      - "PLUGIN_ID=com.morcherlf.deepseek"
